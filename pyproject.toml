[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fairways"
version = "0.0.1"
description = "Fairness auditing and mitigation for machine learning"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
keywords = ["fairness", "machine learning", "bias", "audit", "mitigation"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24",
]

[project.urls]
Homepage = "https://github.com/ton-user/fairways"
Repository = "https://github.com/ton-user/fairways"
